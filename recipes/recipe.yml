# yaml-language-server: $schema=https://schema.blue-build.org
name: butrelinux
description: Bazzite-style KDE on Bluefin GDX for Lenovo Legion 5.

base-image: ghcr.io/ublue-os/bluefin-gdx
image-version: latest 

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      - nonfree: rpmfusion
      - files:
          - https://packages.microsoft.com
    install:
      packages:
        - fastfetch
        - micro
        - starship
        - steam
        - code
        - btop
        - mangohud
        - gamemode
        - sddm
        - power-profiles-daemon
        - nvtop
        - xdg-desktop-portal-kde
        - pipewire-codec-aptx
    group-install:
      packages:
        - "KDE Plasma Workspaces"
    remove:
      packages:
        - firefox
        - firefox-langpacks
    group-remove:
      packages:
        - "GNOME Desktop Environment"

  - type: kargs
    kargs:
      - nvidia-drm.modeset=1
      - nvidia.NVreg_PreserveVideoMemoryAllocations=1
      - rd.driver.blacklist=nouveau
      - modprobe.blacklist=nouveau
      - amdgpu.ppfeaturemask=0xffffffff
      - acpi_backlight=vendor 
      - split_lock_detect=off 

  - type: systemd
    system:
      enabled:
        - sddm.service
        - power-profiles-daemon.service
      disabled:
        - gdm.service

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.kde.gwenview
          - it.miosemante.gearlever
      - scope: user

  - type: signing
