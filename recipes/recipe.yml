# yaml-language-server: $schema=https://schema.blue-build.org
name: butrelinux
description: Bazzite-style KDE on Bluefin GDX (EL10) for Lenovo Legion 5.

base-image: ghcr.io/ublue-os/bluefin-gdx
image-version: lts

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    # Deleting the 'repos' key completely to bypass the BlueBuild module bug
    install:
      packages:
        - fastfetch
        - micro
        - starship
        - steam
        - code
        - btop
        - mangohud
        - gamemode
        - sddm
        - power-profiles-daemon
        - nvtop
        - xdg-desktop-portal-kde
        - pipewire-codec-aptx
        # Explicit KDE core packages for EL10 stability
        - plasma-desktop
        - plasma-workspace-wayland
        - kde-settings-plasma
        - kscreen
        - kinfocenter
        - dolphin
        - konsole
        - sddm-kcm
        - sddm-breeze
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - gnome-shell
        - gdm

  - type: kargs
    kargs:
      - nvidia-drm.modeset=1
      - nvidia.NVreg_PreserveVideoMemoryAllocations=1
      - rd.driver.blacklist=nouveau
      - modprobe.blacklist=nouveau
      - amdgpu.ppfeaturemask=0xffffffff
      - acpi_backlight=vendor
      - split_lock_detect=off

  - type: systemd
    system:
      enabled:
        - sddm.service
        - power-profiles-daemon.service
      disabled:
        - gdm.service

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.kde.gwenview
          - it.miosemante.gearlever
      - scope: user

  - type: signing
