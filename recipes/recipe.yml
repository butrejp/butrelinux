# yaml-language-server: $schema=https://schema.blue-build.org
name: butrelinux
description: Bazzite-style KDE on Bluefin GDX for Lenovo Legion 5.

base-image: ghcr.io/ublue-os/bluefin-gdx
image-version: lts

modules:
  - type: files
    files:
      - source: system
        destination: /

  # Stage 1: Use DNF to install the local RPM files.
  # Using the internal destination path where the files module puts them.
  - type: dnf
    install:
      packages:
        - /rpms/rpmfusion-free-release-10.noarch.rpm
        - /rpms/rpmfusion-nonfree-release-10.noarch.rpm

  # Stage 2: Now that Stage 1 activated the repos, install the packages.
  - type: rpm-ostree
    install:
      - fastfetch
      - micro
      - starship
      - steam
      - btop
      - mangohud
      - gamemode
      - sddm
      - power-profiles-daemon
      - nvtop
      - xdg-desktop-portal-kde
      - pipewire-codec-aptx
      - plasma-desktop
      - plasma-workspace-wayland
      - kde-settings-plasma
      - kscreen
      - kinfocenter
      - dolphin
      - konsole
      - sddm-kcm
      - sddm-breeze
    remove:
      - gnome-shell
      - gdm

  - type: kargs
    kargs:
      - nvidia-drm.modeset=1
      - nvidia.NVreg_PreserveVideoMemoryAllocations=1
      - rd.driver.blacklist=nouveau
      - modprobe.blacklist=nouveau
      - amdgpu.ppfeaturemask=0xffffffff
      - acpi_backlight=vendor
      - split_lock_detect=off

  - type: systemd
    system:
      enabled:
        - sddm.service
        - power-profiles-daemon.service
      disabled:
        - gdm.service

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.kde.gwenview
          - it.miosemante.gearlever
      - scope: user

  - type: signing
