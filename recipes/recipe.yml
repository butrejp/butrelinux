# yaml-language-server: $schema=https://schema.blue-build.org 
name: butrelinux
description: Bluefin-GDX with KDE Plasma
base-image: ghcr.io/ublue-os/bluefin-gdx
image-version: lts

modules:
  - type: files
    files:
      - source: rpms
        destination: /rpms
      - source: system
        destination: /

  - type: script
    snippets:
      - dnf config-manager --set-enabled crb

  - type: dnf
    install:
      packages:
        - /rpms/rpmfusion-free-release-10.noarch.rpm
        - /rpms/rpmfusion-nonfree-release-10.noarch.rpm

  - type: rpm-ostree
    install:
      # SELinux/policy utils
      - policycoreutils
      - policycoreutils-python-utils
      - policycoreutils-devel
      - selinux-policy-targeted
      - libsemanage

      # Core Plasma desktop environment
      - plasma-desktop
      - plasma-workspace-wayland
      - kde-settings-plasma
      - kscreen
      - kinfocenter
      - sddm
      - sddm-kcm
      - sddm-breeze
      - polkit-kde

      - dolphin
      - kate
      - konsole
      - kio-admin
      - ark
      - spectacle
      - okular
      - plasma-systemmonitor
      - kde-gtk-config
      - breeze-gtk

      - fastfetch
      - micro
      - btop
      - nvtop
      - xdg-desktop-portal-kde

      - powerdevil
      - tuned
      - tuned-ppd
      - tuned-profiles-atomic

    remove:
      # Core GNOME components
      - gnome-initial-setup
      - gnome-session-wayland-session
      - gnome-session
      - gnome-shell
      - gdm
      - gnome-control-center
      - nautilus
      - ptyxis

  # Fix for tuned-ppd log permissions bug (Bluefin-LTS issue #841)
  - type: script
    snippets:
      - |
        mkdir -p /var/log/tuned
        chmod 755 /var/log/tuned
        touch /var/log/tuned/tuned-ppd.log
        chmod 644 /var/log/tuned/tuned-ppd.log

  - type: kargs
    kargs:
      - nvidia-drm.modeset=1
      - nvidia.NVreg_PreserveVideoMemoryAllocations=1
      - rd.driver.blacklist=nouveau
      - modprobe.blacklist=nouveau
      - amdgpu.ppfeaturemask=0xffffffff
      - acpi_backlight=vendor
      - split_lock_detect=off

  - type: systemd
    system:
      enabled:
        - sddm.service
        - tuned.service
        - tuned-ppd.service  # Explicitly enable tuned-ppd
      disabled:
        - gdm.service

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - it.mijorus.gearlever
          - io.github.kolunmi.Bazaar
          - org.kde.kcalc
          - com.valvesoftware.Steam

  - type: script
    scripts:
      - image-info.sh
      
  - type: script
    snippets:
    - |
      flatpak override --system --env=__NV_PRIME_RENDER_OFFLOAD=1 \
        --env=__VK_LAYER_NV_optimus=NVIDIA_only \
        --env=__GLX_VENDOR_LIBRARY_NAME=nvidia \
        com.valvesoftware.Steam

  - type: signing
