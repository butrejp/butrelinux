# yaml-language-server: $schema=https://schema.blue-build.org
name: butrelinux
description: Bluefin-GDX with KDE Plasma
base-image: ghcr.io/ublue-os/bluefin-gdx
image-version: lts
modules:
  - type: files
    files:
      - source: rpms
        destination: /rpms
      - source: system
        destination: /
  - type: script
    snippets:
      - dnf config-manager --set-enabled crb
  - type: dnf
    install:
      packages:
        - /rpms/rpmfusion-free-release-10.noarch.rpm
        - /rpms/rpmfusion-nonfree-release-10.noarch.rpm
  - type: rpm-ostree
    install:
      - policycoreutils
      - policycoreutils-python-utils
      - policycoreutils-devel
      - selinux-policy-targeted
      - libsemanage
      - plasma-desktop
      - plasma-workspace-wayland
      - kde-settings-plasma
      - kscreen
      - kinfocenter
      - dolphin
      - konsole
      - sddm
      - sddm-kcm
      - sddm-breeze
      - fastfetch
      - micro
      - btop
      - nvtop
      - xdg-desktop-portal-kde
    remove:
      - gnome-initial-setup
      - gnome-session-wayland-session
      - gnome-session
      - gnome-shell
      - gdm
      - gnome-control-center
      - nautilus
      - ptyxis
  - type: kargs
    kargs:
      - nvidia-drm.modeset=1
      - nvidia.NVreg_PreserveVideoMemoryAllocations=1
      - rd.driver.blacklist=nouveau
      - modprobe.blacklist=nouveau
      - amdgpu.ppfeaturemask=0xffffffff
      - acpi_backlight=vendor
      - split_lock_detect=off
  - type: systemd
    system:
      enabled:
        - sddm.service
      disabled:
        - gdm.service
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.kde.gwenview
          - com.valvesoftware.Steam
          - it.mijorus.gearlever
      - scope: user

  - type: script
        scripts:
          - 00-image-info.sh

  - type: signing
