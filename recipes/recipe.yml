# yaml-language-server: $schema=https://schema.blue-build.org
name: butrelinux
description: Bluefin-GDX with KDE Plasma
base-image: ghcr.io/ublue-os/bluefin-gdx
image-version: lts

modules:
  - type: files
    files:
      - source: rpms
        destination: /rpms
      - source: system
        destination: /

  - type: script
    snippets:
      - dnf config-manager --set-enabled crb

  - type: dnf
    install:
      packages:
        - /rpms/rpmfusion-free-release-10.noarch.rpm
        - /rpms/rpmfusion-nonfree-release-10.noarch.rpm

  - type: rpm-ostree
    install:
      # SELinux/policy utils (your original)
      - policycoreutils
      - policycoreutils-python-utils
      - policycoreutils-devel
      - selinux-policy-targeted
      - libsemanage

      # Core Plasma desktop environment
      - plasma-desktop
      - plasma-workspace-wayland
      - kde-settings-plasma
      - kscreen
      - kinfocenter
      - sddm
      - sddm-kcm
      - sddm-breeze
      - polkit-kde

      - dolphin                     # file manager
      - kate                        # text editor
      - konsole                     # terminal
      - kio-admin                   # root file ops in Dolphin
      - ark                         # archive manager
      - spectacle                   # screenshots (CLI support)
      - okular                      # PDF viewer
      - plasma-systemmonitor
      - kde-gtk-config
      - breeze-gtk

      - fastfetch
      - micro
      - btop
      - nvtop
      - xdg-desktop-portal-kde
      - powerdevil
      - steam

    remove:
      # Core GNOME components to remove for clean Plasma switch
      - gnome-initial-setup
      - gnome-session-wayland-session
      - gnome-session
      - gnome-shell
      - gdm
      - gnome-control-center
      - nautilus
      - ptyxis

  - type: kargs
    kargs:
      - nvidia-drm.modeset=1
      - nvidia.NVreg_PreserveVideoMemoryAllocations=1
      - rd.driver.blacklist=nouveau
      - modprobe.blacklist=nouveau
      - amdgpu.ppfeaturemask=0xffffffff
      - acpi_backlight=vendor
      - split_lock_detect=off

  - type: systemd
    system:
      enabled:
        - sddm.service
      disabled:
        - gdm.service

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox          # browser
          - it.mijorus.gearlever         # AppImage manager
          - io.github.kolunmi.Bazaar     # Package Manager
          - org.kde.kcalc                # calculator

  - type: script
    scripts:
      - image-info.sh

  - type: signing
