# yaml-language-server: $schema=https://schema.blue-build.org
name: butrelinux
description: Bluefin GDX on kde, hopefully.

base-image: ghcr.io/ublue-os/bluefin-gdx
image-version: stable 

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      nonfree: rpmfusion
      files:
        - https://packages.microsoft.com
    install:
      packages:
        - fastfetch
        - micro
        - starship
        - steam
        - code
        - btop
        - mangohud
        - gamemode
        - sddm # Ensure the package is explicitly installed
    group-install:
      packages:
        - "KDE Plasma Workspaces"
    remove:
      packages:
        - firefox
        - firefox-langpacks
    group-remove:
      packages:
        - "GNOME Desktop Environment"

  # Automates the display manager switch during the build
  - type: systemd
    system:
      enabled:
        - sddm.service
      disabled:
        - gdm.service

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.kde.gwenview
          - it.miosemante.gearlever
      - scope: user

  - type: signing
